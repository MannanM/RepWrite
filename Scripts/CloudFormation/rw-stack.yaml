AWSTemplateFormatVersion: '2010-09-09'

Parameters:
  JavaAppAmiId:
    Type: 'AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>'
    Default: '/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64'
    Description: The SSM Parameter for the latest Amazon Linux 2023 ARM64 AMI.
  GitHubOrg:
    Type: String
    Default: MannanM
  GitHubRepo:
    Type: String
    Default: RepWrite
  AcmCertificateArn:
    Type: String
    Description: The ARN of the ACM certificate (MUST be in us-east-1 for CloudFront).
    Default: arn:aws:acm:us-east-1:114076030472:certificate/cff0c6e3-867a-4458-ae8e-d8fea6b11dbc
  DomainHostedZoneId:
    Type: String
    Description: "The ID of the Route 53 Hosted Zone"
    Default: "Z03746511O0O00Z5LO7QS"

Resources:
  ### NETWORKING ###
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: rw-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
  
  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PubSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Sub "${AWS::Region}a"
      MapPublicIpOnLaunch: true

  SubnetRouteTableAssociationA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PubSubnetA
      RouteTableId: !Ref PublicRouteTable

  ### ELASTIC IP ###
  JavaAppEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: rw-java-eip

  InstanceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: "Allow HTTP traffic from CloudFront to the Java App"
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourcePrefixListId: pl-b8a742d1 #com.amazonaws.global.cloudfront.origin-facing

  ### S3 BUCKET ###
  RwBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    Properties:
      BucketName: repwrite
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  ### IAM ROLES ###
  RWJavaRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: RW-Java-EC2-Policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: !Sub "arn:aws:s3:::${RwBucket}/*"
              - Effect: Allow
                Action:
                  - ec2:AssociateAddress
                Resource: "*"
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref GeminiApiKeySecret
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:DescribeTable
                Resource:
                  - !GetAtt SenatorsTable.Arn
                  - !GetAtt CausesTable.Arn
                  - !GetAtt CachedAppealsTable.Arn

  RWJavaInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref RWJavaRole

  ### EC2 LAUNCH TEMPLATE & ASG ###
  JavaAppLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref JavaAppAmiId
        InstanceType: t4g.small
        IamInstanceProfile:
          Name: !Ref RWJavaInstanceProfile
        NetworkInterfaces:
          - AssociatePublicIpAddress: true
            DeviceIndex: 0
            Groups:
              - !Ref InstanceSecurityGroup
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e
            
            # 1. Grab metadata token and Instance ID
            TOKEN=$(curl -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCE_ID=$(curl -H "X-aws-ec2-metadata-token: $TOKEN" -s http://169.254.169.254/latest/meta-data/instance-id)
            
            # 2. Attach the Elastic IP to this newly booted instance
            aws ec2 associate-address --instance-id $INSTANCE_ID --allocation-id ${JavaAppEIP.AllocationId} --region ${AWS::Region} --allow-reassociation
            
            # 3. Download and start Java App
            echo "Downloading app.jar from S3 bucket ${RwBucket}..."
            aws s3 cp s3://${RwBucket}/app.jar /home/ec2-user/app.jar --no-progress
            chown ec2-user:ec2-user /home/ec2-user/app.jar
            
            yum update -y
            yum install -y java-21-amazon-corretto-headless
            java -Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxMetaspaceSize=256m -Xss512k -Dspring.profiles.active=prod -jar /home/ec2-user/app.jar
            echo "--- UserData execution finished ---"

  JavaAppAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: rw-java-app-asg # Fixed name for your bash script
      MinSize: '1'
      MaxSize: '1'
      DesiredCapacity: '1'
      VPCZoneIdentifier:
        - !Ref PubSubnetA
      HealthCheckType: EC2
      HealthCheckGracePeriod: 60
      LaunchTemplate:
        LaunchTemplateId: !Ref JavaAppLaunchTemplate
        Version: !GetAtt JavaAppLaunchTemplate.LatestVersionNumber

  ### CLOUDFRONT (Replaces ALB for HTTPS) ###
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: RwOriginDnsRecord
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2
        PriceClass: PriceClass_100
        Aliases:
          - repwrite.click
          - www.repwrite.click
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        Origins:
          - Id: JavaAppEIPOrigin
            DomainName: origin.repwrite.click
            CustomOriginConfig:
              HTTPPort: 8080
              HTTPSPort: 443
              OriginProtocolPolicy: http-only # Connects to EC2 over HTTP 8080
        DefaultCacheBehavior:
          TargetOriginId: JavaAppEIPOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS, PUT, POST, PATCH, DELETE]
          # Disables caching and passes all headers/cookies to your Spring Boot app
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad 
          OriginRequestPolicyId: !Ref RwOriginRequestPolicy

  RwOriginRequestPolicy:
    Type: AWS::CloudFront::OriginRequestPolicy
    Properties:
      OriginRequestPolicyConfig:
        Name: RwForwardAllPolicy
        Comment: "Forwards all viewer headers, cookies, and query strings to EC2"
        HeadersConfig:
          HeaderBehavior: allViewer
        QueryStringsConfig:
          QueryStringBehavior: all
        CookiesConfig:
          CookieBehavior: all

  ### DNS ###
  RwOriginDnsRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      Name: origin.repwrite.click
      Type: A
      TTL: '60'
      ResourceRecords:
        - !Ref JavaAppEIP

  RwDnsRecord:
    Type: AWS::Route53::RecordSetGroup
    Properties:
      HostedZoneId: !Ref DomainHostedZoneId
      RecordSets:
       - Name: repwrite.click
         Type: A
         AliasTarget:
           DNSName: !GetAtt CloudFrontDistribution.DomainName
           HostedZoneId: Z2FDTNDATAQYW2 # Global static CloudFront Zone ID
       - Name: www.repwrite.click
         Type: A
         AliasTarget:
           DNSName: !GetAtt CloudFrontDistribution.DomainName
           HostedZoneId: Z2FDTNDATAQYW2

  ### GITHUB ACTIONS ###
  # Already created in this AWS Account
  #  GitHubOIDCProvider:
  #    Type: AWS::IAM::OIDCProvider
  #    Properties:
  #      Url: https://token.actions.githubusercontent.com
  #      ClientIdList:
  #        - sts.amazonaws.com
  #      ThumbprintList:
  #        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: GitHubActionsDeployRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Sub 'arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com'
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                'token.actions.githubusercontent.com:sub': !Sub 'repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/master'
      Policies:
        - PolicyName: S3AndAutoScalingPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                Resource: !Sub 'arn:aws:s3:::${RwBucket}/app.jar'
              - Effect: Allow
                Action:
                  - autoscaling:StartInstanceRefresh
                Resource: !Sub 'arn:${AWS::Partition}:autoscaling:${AWS::Region}:${AWS::AccountId}:autoScalingGroup:*:autoScalingGroupName/${JavaAppAutoScalingGroup}'

  ### SECRETS MANAGER ###
  GeminiApiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: gemini/api-key
      Description: API key for Gemini AI service
      Tags:
        - Key: App
          Value: RW
        - Key: Layer
          Value: security

  ### DYNAMODB TABLES ###
  SenatorsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SenatorsTable
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  CausesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CausesTable
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  CachedAppealsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: CachedAppealsTable
      AttributeDefinitions:
        - AttributeName: causeId
          AttributeType: S
        - AttributeName: senatorIdInfoHash
          AttributeType: S
      KeySchema:
        - AttributeName: causeId
          KeyType: HASH
        - AttributeName: senatorIdInfoHash
          KeyType: RANGE
      BillingMode: PAY_PER_REQUEST
