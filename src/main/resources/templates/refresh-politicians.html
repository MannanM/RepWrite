<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>RepWrite - Refresh Politicians</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
            --border: #334155;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.description {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .controls {
            margin-bottom: 2rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background-color: var(--border);
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-bottom: 1rem;
            font-weight: 600;
            padding: 1rem;
            border-radius: 0.75rem;
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid var(--primary);
            display: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th, td {
            text-align: left;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        th {
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.05em;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .badge {
            padding: 0.25rem 0.5rem;
            border-radius: 0.375rem;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .badge-senator { background: rgba(34, 197, 94, 0.1); color: #4ade80; }
        .badge-representative { background: rgba(99, 102, 241, 0.1); color: #818cf8; }

        #log {
            margin-top: 2rem;
            background: #000;
            padding: 1rem;
            border-radius: 0.75rem;
            font-family: 'Fira Code', monospace;
            font-size: 0.825rem;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid var(--border);
            display: none;
        }

        .log-entry { margin-bottom: 0.25rem; }
        .log-success { color: var(--success); }
        .log-error { color: var(--error); }
    </style>
</head>
<body>
    <div class="container">
        <h1>Politician Data Refresh</h1>
        <p class="description">Manage and enrich politician background data from Wikipedia. Access requires admin credentials.</p>
        
        <div class="controls">
            <button id="refreshAllBtn">Refresh All</button>
            <button id="refreshEmptyBtn">Refresh ONLY Empty</button>
            <span id="statSummary" style="color: var(--text-muted); font-size: 0.875rem;"></span>
        </div>

        <div id="status" class="status"></div>
        <div id="log"></div>

        <table id="politicianTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Electorate</th>
                    <th>Background</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="politicianBody">
                <tr><td colspan="6" style="text-align:center;">Loading politicians...</td></tr>
            </tbody>
        </table>
    </div>

    <script th:inline="javascript">
        const refreshAllBtn = document.getElementById('refreshAllBtn');
        const refreshEmptyBtn = document.getElementById('refreshEmptyBtn');
        const statusDiv = document.getElementById('status');
        const politicianBody = document.getElementById('politicianBody');
        const logDiv = document.getElementById('log');
        const statSummary = document.getElementById('statSummary');

        function addLog(message, isError = false) {
            logDiv.style.display = 'block';
            const entry = document.createElement('div');
            entry.className = 'log-entry' + (isError ? ' log-error' : ' log-success');
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        async function fetchPoliticians() {
            try {
                const response = await fetch('/api/politicians');
                if (!response.ok) throw new Error('Failed to fetch');
                const politicians = await response.json();
                displayPoliticians(politicians);
            } catch (error) {
                console.error('Error:', error);
                politicianBody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:var(--error);">Failed to load politicians.</td></tr>';
            }
        }

        function displayPoliticians(politicians) {
            politicianBody.innerHTML = '';
            politicians.forEach(p => {
                const row = document.createElement('tr');
                const typeClass = p.type?.toLowerCase() === 'representative' ? 'badge-representative' : 'badge-senator';
                row.innerHTML = `
                    <td style="font-family: 'Fira Code', monospace; font-size: 0.8rem;">${p.id}</td>
                    <td style="font-weight: 600;">${p.name}</td>
                    <td><span class="badge ${typeClass}">${p.type || 'Senator'}</span></td>
                    <td>${p.electorate || 'Unknown'}</td>
                    <td>${p.background ? '✅' : '❌'}</td>
                    <td><button onclick="refreshSingle('${p.id}')" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Refresh</button></td>
                `;
                politicianBody.appendChild(row);
            });
            statSummary.textContent = `Total: ${politicians.length} | Missing Background: ${politicians.filter(p => !p.background).length}`;
        }

        async function refreshSingle(id) {
            const password = prompt("Enter admin password:");
            if (!password) return;
            
            statusDiv.style.display = 'block';
            statusDiv.innerText = `Refreshing ${id}...`;
            try {
                const response = await fetch(`/api/politicians/${id}`, {
                    method: 'POST',
                    headers: { 'Authorization': 'Basic ' + btoa('admin:' + password) }
                });
                if (response.ok) {
                    statusDiv.innerText = `Successfully refreshed ${id}`;
                    fetchPoliticians();
                } else {
                    statusDiv.innerText = `Error: ${response.status} ${response.statusText}`;
                }
            } catch (err) {
                statusDiv.innerText = `Error: ${err.message}`;
            }
        }

        async function refreshBatch(onlyEmpty) {
            const password = prompt("Enter admin password:");
            if (!password) return;

            refreshAllBtn.disabled = true;
            refreshEmptyBtn.disabled = true;
            statusDiv.style.display = 'block';
            logDiv.innerHTML = '';
            
            try {
                const listResp = await fetch('/api/politicians');
                let politicians = await listResp.json();
                if (onlyEmpty) politicians = politicians.filter(p => !p.background);

                statusDiv.innerText = `Processing batch of ${politicians.length}...`;
                
                for (let i = 0; i < politicians.length; i++) {
                    const p = politicians[i];
                    statusDiv.innerText = `(${i+1}/${politicians.length}) Refreshing ${p.name}...`;
                    try {
                        const resp = await fetch(`/api/politicians/${p.id}`, {
                            method: 'POST',
                            headers: { 'Authorization': 'Basic ' + btoa('admin:' + password) }
                        });
                        if (resp.ok) {
                            addLog(`Refreshed ${p.name}`);
                        } else {
                            addLog(`Failed ${p.name}: ${resp.status}`, true);
                        }
                    } catch (err) {
                        addLog(`Error ${p.name}: ${err.message}`, true);
                    }
                    if (i < politicians.length - 1) await new Promise(r => setTimeout(r, 2000)); // Rate limiting
                }
                statusDiv.innerText = 'Batch complete.';
                fetchPoliticians();
            } catch (err) {
                statusDiv.innerText = `Batch error: ${err.message}`;
            } finally {
                refreshAllBtn.disabled = false;
                refreshEmptyBtn.disabled = false;
            }
        }

        refreshAllBtn.onclick = () => refreshBatch(false);
        refreshEmptyBtn.onclick = () => refreshBatch(true);

        fetchPoliticians();
    </script>
</body>
</html>
