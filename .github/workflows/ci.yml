# .github/workflows/ci.yml

name: Java CI on Pull Request

# This workflow will be triggered on every pull request.
on:
  pull_request:
    branches: [ '**' ] # Triggers the workflow on pull requests to any branch
    # The workflow will NOT run if the only changes are in these paths
    paths-ignore:
      - '.github/dependabot.yml'  # Ignores changes to the dependabot configuration file
      - '.github/workflows/deploy.yml' # Ignores changes to the deployment workflow

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      # Checks out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Checkout repository
        uses: actions/checkout@v6

      # Sets up a Java 21 environment for use in subsequent steps
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven' # Caches Maven dependencies to speed up subsequent builds.

      # Runs the Maven clean and test goals
      - name: Build and test with Maven
        run: mvn clean test -Dheadless.mode=true --batch-mode --no-transfer-progress
